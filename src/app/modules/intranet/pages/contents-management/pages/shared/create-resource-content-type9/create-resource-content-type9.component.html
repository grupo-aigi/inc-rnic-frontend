<form
  [formGroup]="formGroup"
  (ngSubmit)="handleSubmit()"
  class="get-quote-form"
>
  <div class="row pt-3">
    <div class="col-lg-12 col-sm-12">
      <div class="form-group">
        <textarea
          name="quote"
          formControlName="quote"
          class="form-control"
          [placeholder]="labels.quoteContent.placeholder[lang]"
          style="resize: vertical; min-height: 200px; max-height: 400px"
        ></textarea>
      </div>
    </div>

    <div class="col-lg-12 col-sm-12">
      <div class="form-group">
        <input
          type="text"
          name="author"
          formControlName="author"
          class="form-control"
          [placeholder]="labels.author.placeholder[lang]"
        />
      </div>
    </div>

    <div class="col-lg-12 col-sm-12">
      <div class="form-group">
        <input
          type="text"
          name="role"
          formControlName="role"
          class="form-control"
          [placeholder]="labels.role.placeholder[lang]"
        />
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-5 col-sm-12 d-flex m-auto">
      <button class="btn default-btn success-button m-1">
        {{ labels.addResource[lang] }}
      </button>
      <button class="btn default-btn clean-button m-1">
        {{ labels.restoreChanges[lang] }}
      </button>
    </div>
  </div>
</form>
