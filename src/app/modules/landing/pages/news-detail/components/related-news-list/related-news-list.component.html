@if (loadingNews) {
  <div
    class="d-flex flex-column align-items-center justify-content-center"
    >
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p class="my-2">{{ labels.loadingNews[lang] }}...</p>
  </div>
} @else {
  <ul>
    @for (newsPoster of newsPosters; track newsPoster) {
      <li
        class="row"
        [title]="newsPoster.description"
        >
        <span class="col-12">{{ formatNewsDate(newsPoster.updatedAt) }}</span>
        <a
          class="col-lg-3 col-md-5 col-sm-12"
        [routerLink]="
          variant === 'PUBLIC'
            ? '/noticias/' + newsPoster.urlName
            : '/intranet/noticias/' + newsPoster.urlName
        "
          >
          <img
          [src]="
            getImageUrlByName(newsPoster.imageName) || '/img/blog/blog-7.jpg'
          "
            alt="Image"
            />
        </a>
        <a
          class="col-lg-9 col-md-7 col-sm-12"
        [routerLink]="
          variant === 'PUBLIC'
            ? '/noticias/' + newsPoster.urlName
            : '/intranet/noticias/' + newsPoster.urlName
        "
          >
          <p>{{ newsPoster.title }}</p>
        </a>
      </li>
    }
  </ul>
}
