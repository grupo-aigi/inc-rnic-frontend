@if (!loading && error) {
  <div
    class="alert alert-warning text-center border-0 mt-5 container"
    role="alert"
    >
    <b>{{ labels.error[lang] }}</b>
  </div>
}

@if (loading) {
  <div
    class="d-flex flex-column align-items-center justify-content-center"
    >
    <div class="spinner-border m-5" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p class="my-2">{{ labels.loadingDocument[lang] }}...</p>
  </div>
} @else {
  <div style="height: 100vh">
    <iframe
      id="pdfFrame"
      [src]="pdfUrl"
      width="100%"
      height="100%"
      frameborder="0"
    ></iframe>
  </div>
}
