<div class="page-title-area bg-partners">
  <div class="container">
    <div class="page-title-content">
      <h2>{{ labels.networkGuidelines[lang] }}</h2>
      <ul>
        <li>
          <a routerLink="/">{{ labels.main[lang] }}</a>
        </li>
        <li class="active">{{ labels.networkGuidelines[lang] }}</li>
      </ul>
    </div>
  </div>
</div>

@if (pdfUrl) {
  <div class="container my-5">
    <iframe
      id="pdfFrame"
      [src]="pdfUrl"
      style="width: 100%; height: 100vh"
      allowfullscreen
      frameborder="0"
    ></iframe>
  </div>
}
