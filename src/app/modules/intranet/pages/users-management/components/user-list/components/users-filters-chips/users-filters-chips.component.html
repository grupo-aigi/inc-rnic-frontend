<section class="chips-container">
  <div class="my-1 gap-1 d-flex flex-row justify-content-start flex-wrap">
    <div class="d-flex flex-column">
      <div>{{ labels.userRoles[lang] }}</div>
      <div class="d-flex flex-row flex-wrap gap-1">
        @for (role of roles; track role) {
          <div
            class="rounded-pill badge badge-primary p-0 position-relative recommendation-chip"
            style="padding-right: 30px !important"
            [style]="{
              'background-color':
                filterCriteria.role === role.value ? 'green' : 'red',
            }"
          >
            <button
              type="button"
              (click)="handleUpdateActiveRole(role.value)"
              class="recommendation-chip p-2 bg-transparent text-white"
              style="font-weight: 800"
            >
              {{ role.label[lang] }}
              <i
                [class]="
                  filterCriteria.role === role.value ? 'bx bx-check' : 'bx bx-x'
                "
                style="
                  font-size: 1.2rem;
                  position: absolute;
                  top: 5px;
                  right: 5px;
                  cursor: pointer;
                "
              ></i>
            </button>
          </div>
        }
      </div>
    </div>
  </div>

  <hr />

  <div class="my-2 gap-1 d-flex flex-row justify-content-start flex-wrap">
    <div class="d-flex flex-column">
      <div>{{ labels.workingCommisions[lang] }}</div>
      <div class="d-flex flex-row flex-wrap gap-1">
        @for (commission of commissions; track commission) {
          <div
            class="rounded-pill badge badge-primary p-0 position-relative"
            style="padding-right: 30px !important"
            [style]="{
              'background-color':
                filterCriteria.commission === commission.value
                  ? 'green'
                  : 'red',
            }"
          >
            <button
              type="button"
              (click)="handleUpdateActiveCommission(commission.value)"
              class="recommendation-chip p-2 bg-transparent text-white"
              style="font-weight: 800"
            >
              {{ commission.label[lang] }}
              <i
                [class]="
                  filterCriteria.commission === commission.value
                    ? 'bx bx-check'
                    : 'bx bx-x'
                "
                style="
                  font-size: 1.2rem;
                  position: absolute;
                  top: 5px;
                  right: 5px;
                  cursor: pointer;
                "
              ></i>
            </button>
          </div>
        }
      </div>
    </div>
  </div>

  <hr />
</section>
