<section class="pt-2">
  <div class="tab get-quote-tab">
    <ul class="tabs">
      <li class="default-btn" #tab0Element (click)="changeActiveTab(0)">
        {{ labels.listNewsletters[lang] }}
      </li>
      <li class="default-btn" (click)="changeActiveTab(1)">
        {{ labels.createNewsletter[lang] }}
      </li>
    </ul>

    <div class="mb-5">
      <div>
        @switch (activeTabIndex) {
          @case (0) {
            <div class="tabs_item">
              <app-list-newsletters></app-list-newsletters>
            </div>
          }
          @case (1) {
            <div class="tabs_item">
              <app-create-newsletter
                (onCreate)="handleCreateNewsletter($event)"
              ></app-create-newsletter>
            </div>
          }
        }
      </div>
    </div>
  </div>
</section>
