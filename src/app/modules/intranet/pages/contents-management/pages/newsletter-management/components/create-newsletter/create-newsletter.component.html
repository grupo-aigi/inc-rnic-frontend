<form
  [formGroup]="formGroup"
  (ngSubmit)="handleSubmit()"
  class="container pt-3 get-quote-form"
  >
  <div class="row pt-3">
    <div class="col-12">
      <label
        for="fileInput_4"
        class="custom-file-button"
        style="width: 100%; margin: 0px"
        >
        <input
          type="file"
          id="fileInput_4"
          (change)="onFileChange($event)"
          accept="application/pdf"
          class="file-input"
          />
        <p class="text-center" style="font-weight: bolder">
          {{
          uploadedPdf
          ? labels.changePdfFile[lang]
          : labels.uploadPdfFile[lang]
          }}
        </p>
      </label>

      @if (isFieldInvalid('filename')) {
        <small class="input-label__invalid">{{
          labels.invalidFile[lang]
        }}</small>
      }

      @if (uploadedPdf) {
        <div>
          <div style="height: 50vh; margin-top: 30px">
            <iframe
              name="archive-pdf-frame"
              id="archive-pdf-frame"
              [src]="uploadedPdf"
              width="100%"
              height="100%"
              frameborder="0"
            ></iframe>
          </div>
        </div>
      }
    </div>
    <div class="col-lg-12 col-sm-12 mt-3">
      <div class="form-group">
        <input
          type="text"
          formControlName="year"
          class="form-control"
          [placeholder]="labels.year.placeholder[lang]"
          />
        @if (isFieldInvalid('year')) {
          <small class="input-label__invalid">{{
            labels.year.errorMsg[lang]
          }}</small>
        }
      </div>
    </div>

    <div class="col-12 row">
      @for (month of months; track month) {
        <div class="form-check col-lg-3 col-sm-6">
          <input
            class="form-check-input"
            type="radio"
            formControlName="month"
            [id]="'month-' + month.id"
            [value]="month.id"
            />
          <label class="form-check-label" [for]="'month-' + month.id">{{
            month[lang]
          }}</label>
        </div>
      }
      @if (isFieldInvalid('month')) {
        <small
          class="input-label__invalid mt-2"
          >{{ labels.month.errorMsg[lang] }}</small
          >
        }
      </div>
    </div>

    <div class="row" style="margin-top: 30px">
      <div class="col-lg-6 col-sm-12 d-flex m-auto">
        <button type="submit" class="btn default-btn success-button m-1">
          {{ labels.confirm[lang] }}
        </button>
        <button
          (click)="handleCleanFields($event)"
          type="button"
          class="btn default-btn clean-button m-1"
          >
          {{ labels.cleanFields[lang] }}
        </button>
      </div>
    </div>
  </form>
