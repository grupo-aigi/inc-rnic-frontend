@for (scientificEcosystem of scientificEcosystems; track $index) {
  <li class="nav-item">
    <a
      [routerLink]="['/ecosistema/' + scientificEcosystem.urlName]"
      class="nav-link dynamic-font-size"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      {{ scientificEcosystem.title }}
    </a>
  </li>
}
