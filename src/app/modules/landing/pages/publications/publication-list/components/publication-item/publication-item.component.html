<div class="row mt-3 mb-2">
  <div class="col-12 py-2">
    @if (!first) {
      <hr />
    }
    <h3 class="dynamic-font-size">{{ publication.title }}</h3>
  </div>

  <div class="col-3 single-blog-post">
    <div class="blog-img">
      <a
        [routerLink]="
          variant === 'PUBLIC'
            ? '/publicaciones/' + publication.urlName
            : '/intranet/publicaciones/' + publication.urlName
        "
        >
        <img
          style="width: 100%"
          [src]="
            getImageUrlByName(publication.imageName) || '/img/image500x810.png'
          "
          [alt]="publication.title"
          />
      </a>
    </div>
  </div>

  <div class="col-9" style="text-align: justify">
    <p style="font-weight: 700" class="dynamic-font-size">
      {{ publication.description }}
    </p>
    <footer class="mt-3">
      <div>
        <p>
          <span
            style="font-weight: bold; margin-right: 5px"
            class="dynamic-font-size"
            >
            {{ labels.createdAt[lang] }}:
          </span>
          <span>{{ formatDate(publication.createdAt!) }}</span>
        </p>
      </div>
      <div>
        <p>
          <span
            style="font-weight: bold; margin-right: 5px"
            class="dynamic-font-size"
            >
            {{ labels.updatedAt[lang] }}:
          </span>
          <span>{{ formatDate(publication.updatedAt!) }}</span>
        </p>
      </div>
    </footer>
  </div>
</div>
