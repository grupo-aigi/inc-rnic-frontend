@for (contact of section.contacts; track $index; let i = $index) {
  <div class="col-lg-12 col-sm-12 mb-3">
    <div class="card">
      <div class="card-body">
        <h5 class="card-title">{{ contact.name }}</h5>
        <p class="card-text mb-1">
          <strong>{{ labels.roleName[lang] }}: </strong> {{ contact.role }}
        </p>
        <p class="card-text mb-3">
          <strong>{{ labels.emailValue[lang] }}: </strong>
          <a [href]="'mailto:' + contact.email">{{ contact.email }}</a>
        </p>
      </div>
    </div>
  </div>
}
