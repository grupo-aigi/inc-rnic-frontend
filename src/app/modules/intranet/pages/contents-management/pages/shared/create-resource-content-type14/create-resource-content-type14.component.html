<form
  [formGroup]="formGroup"
  (ngSubmit)="handleSubmit()"
  class="get-quote-form"
>
  <div class="row pt-3">
    <div class="col-lg-12 col-sm-12">
      <div class="form-group">
        <input
          type="text"
          name="text"
          formControlName="text"
          class="form-control"
          [placeholder]="labels.link.text[lang]"
        />
      </div>
    </div>

    <div class="col-lg-12 col-sm-12">
      <div class="form-group">
        <input
          type="text"
          name="url"
          formControlName="url"
          class="form-control"
          [placeholder]="labels.link.url[lang]"
        />
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-5 col-sm-12 d-flex m-auto">
      <button type="submit" class="btn default-btn success-button m-1">
        {{ labels.addResource[lang] }}
      </button>
      <button type="reset" class="btn default-btn clean-button m-1">
        {{ labels.restoreChanges[lang] }}
      </button>
    </div>
  </div>
</form>
