<section class="chips-container">
  <div class="my-1 gap-1 d-flex flex-row justify-content-start flex-wrap">
    <div class="d-flex flex-column">
      <div>{{ labels.researchLines[lang] }}</div>
      <div class="d-flex flex-row flex-wrap gap-1">
        @for (researchLine of researchLines; track researchLine) {
          <div
            class="rounded-pill badge badge-primary p-0 position-relative recommendation-chip"
            style="padding-right: 30px !important"
          [style]="{
            'background-color':
              filterCriteria.linea === researchLine.value ? 'green' : 'red',
          }"
            >
            <button
              type="button"
              (click)="handleUpdateActiveResearchLine(researchLine.value)"
              class="recommendation-chip p-2 bg-transparent text-white"
              style="font-weight: 800"
              >
              {{ researchLine.name[lang] }}
              <i
              [class]="
                filterCriteria.linea === researchLine.value
                  ? 'bx bx-check'
                  : 'bx bx-x'
              "
              style="
                font-size: 1.2rem;
                position: absolute;
                top: 5px;
                right: 5px;
                cursor: pointer;
              "
              ></i>
            </button>
          </div>
        }
      </div>
    </div>
  </div>

  <hr />
</section>
