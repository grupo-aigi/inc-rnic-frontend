<form [formGroup]="formGroup" (ngSubmit)="handleSubmit()">
  <div class="row">
    <div class="col-lg-12 col-sm-12">
      <div class="form-group">
        <input
          type="text"
          name="iframeLink"
          formControlName="iframeLink"
          class="form-control"
          [placeholder]="labels.iframe.placeholder[lang]"
          [ngClass]="{
            'inline-text-input__invalid': isFieldInvalid('iframeLink'),
          }"
        />
        @if (
          formGroup.get('iframeLink')?.value && !isFieldInvalid('iframeLink')
        ) {
          <small style="color: green">
            {{ labels.iframe.valid[lang] }}
          </small>
        }
        @if (isFieldInvalid('iframeLink')) {
          <small class="input-label__invalid">
            {{ labels.iframe.error[lang] }}
          </small>
        }
      </div>
    </div>

    <div class="col-lg-12 col-sm-12">
      <div class="form-group">
        <textarea
          type="text"
          name="detail"
          formControlName="detail"
          style="max-height: 200px; resize: vertical"
          class="form-control"
          [placeholder]="labels.addAddress.placeholder[lang]"
          [ngClass]="{
            'inline-text-input__invalid': isFieldInvalid('detail'),
          }"
        ></textarea>
        @if (isFieldInvalid('detail')) {
          <small class="input-label__invalid">
            {{ labels.addAddress.error[lang] }}
          </small>
        }
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-5 col-sm-12 d-flex m-auto">
      <button type="submit" class="btn default-btn success-button m-1">
        {{ labels.addResource[lang] }}
      </button>
      <button type="reset" class="btn default-btn clean-button m-1">
        {{ labels.restoreChanges[lang] }}
      </button>
    </div>
  </div>
</form>
