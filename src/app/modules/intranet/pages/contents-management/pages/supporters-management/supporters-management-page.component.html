<section class="pt-2">
  <div class="tab get-quote-tab">
    <ul class="tabs">
      <li #tab0Element (click)="changeActiveTab(0)">
        {{ labels.listSupporters[lang] }}
      </li>
      <li (click)="changeActiveTab(1)">
        {{ labels.createSupporter[lang] }}
      </li>
    </ul>

    <div class="mb-5">
      <div>
        @switch (activeTabIndex) {
          @case (0) {
            <div class="tabs_item">
              <app-list-supporters></app-list-supporters>
            </div>
          }
          @case (1) {
            <div class="tabs_item">
              <app-create-supporter
                (onCreate)="handleCreateSupporter($event)"
              ></app-create-supporter>
            </div>
          }
        }
      </div>
    </div>
  </div>
</section>
