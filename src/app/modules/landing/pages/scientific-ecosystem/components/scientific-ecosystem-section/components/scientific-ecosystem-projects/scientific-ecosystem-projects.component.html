<div class="row mt-4">
  <div class="row mb-5">
    @for (project of section.projects; track $index; let i = $index) {
      <div class="col-lg-6 col-sm-12 mb-3">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">{{ project.name }}</h5>
            <p class="card-text">
              <strong>Autor:</strong> {{ project.author }}
            </p>
            <p class="card-text">
              <strong>Objetivos:</strong>
            </p>
            <ul>
              @for (objective of project.objectives; track $index) {
                <li>{{ objective }}</li>
              }
            </ul>
          </div>
        </div>
      </div>
    }
  </div>
</div>
