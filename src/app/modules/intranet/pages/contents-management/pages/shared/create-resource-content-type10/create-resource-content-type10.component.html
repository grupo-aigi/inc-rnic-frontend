<form [formGroup]="formGroup" (ngSubmit)="handleSubmit()">
  <div class="row pt-3">
    <div class="col-lg-12 col-sm-12">
      <div class="form-group">
        <input
          type="text"
          name="url"
          formControlName="url"
          class="form-control"
          [placeholder]="labels.url.placeholder[lang]"
        />
      </div>
    </div>

    <div class="col-lg-3 col-sm-12">
      <button
        type="button"
        data-bs-toggle="modal"
        data-bs-target="#input-event-resource10-image"
        class="btn default-btn"
      >
        {{ labels.addImage[lang] }}
      </button>
    </div>
  </div>

  <div class="row">
    @if (currentImage) {
      <div class="col-lg-6 col-sm-12">
        <img
          [src]="getImageUrlByName(currentImage)"
          class="image-list"
          style="border: 2px solid #12bec8; border-radius: 5px"
          alt="Banner item"
        />
      </div>
    }
  </div>

  @if (currentImage && this.formGroup.get('url')?.valid) {
    <div class="row my-4">
      <div class="col-lg-3 col-sm-12">
        <button
          (click)="handleAddBannerItem()"
          type="button"
          class="btn default-btn"
        >
          {{ labels.addItem[lang] }}
        </button>
      </div>
    </div>
  }

  <div class="row mt-4">
    <h4>{{ labels.itemsList[lang] }}</h4>

    <div class="container">
      @if (bannerItems.length === 0) {
        <div class="alert alert-info text-center">
          {{ labels.noItems[lang] }}
        </div>
      }
    </div>

    <div class="row mb-5">
      @for (bannerItem of bannerItems; track bannerItem; let i = $index) {
        <div class="col-lg-6 col-sm-12 position-relative">
          <a [href]="bannerItem.url" target="_blank" class="m-2">
            <img
              [src]="getImageUrlByName(bannerItem.image)"
              class="image-list"
              style="border: 2px solid #12bec8; border-radius: 5px"
              alt="Banner item"
            />
            <div class="position-absolute" style="top: 10px; left: 20px">
              <b class="m-2 bg-white p-1"
                >{{ labels.itemNro[lang] }} #{{ i + 1 }}
                <i class="bx bx-link-external"></i>
              </b>
              <button
                type="button"
                class="btn btn-danger"
                (click)="handleDeleteImage(i)"
              >
                {{ labels.deleteItem[lang] }}
              </button>
            </div>
          </a>
        </div>
      }
    </div>
  </div>

  <div class="row">
    <div class="col-lg-5 col-sm-12 d-flex m-auto">
      <button type="submit" class="btn default-btn success-button m-1">
        {{ labels.addResource[lang] }}
      </button>
      <button type="reset" class="btn default-btn clean-button m-1">
        {{ labels.restoreChanges[lang] }}
      </button>
    </div>
  </div>
</form>

<app-upload-or-reuse-image
  modalFor="input-event-resource10-image"
  [elementType]="target"
  (onSubmit)="handleAddBannerImage($event)"
></app-upload-or-reuse-image>
