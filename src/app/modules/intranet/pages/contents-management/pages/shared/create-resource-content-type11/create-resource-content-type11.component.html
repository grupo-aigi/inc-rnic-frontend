<form
  [formGroup]="formGroup"
  (ngSubmit)="handleSubmit()"
  class="get-quote-form"
>
  <div class="row pt-3">
    <div class="col-lg-12 col-sm-12">
      <div class="form-group">
        <input
          type="text"
          name="youtubeLink"
          formControlName="youtubeLink"
          class="form-control"
          [placeholder]="labels.youtubeLink.placeholder[lang]"
          [ngClass]="{
            'inline-text-input__invalid': isFieldInvalid('youtubeLink'),
          }"
        />
        @if (isFieldInvalid('youtubeLink')) {
          <small class="input-input__invalid">
            {{ labels.youtubeLink.error[lang] }}
          </small>
        }
      </div>
    </div>

    <div class="col-lg-12 col-sm-12">
      <div class="form-group">
        <input
          type="text"
          name="title"
          formControlName="title"
          class="form-control"
          [placeholder]="labels.videoTitle.placeholder[lang]"
          [ngClass]="{
            'inline-text-input__invalid': isFieldInvalid('title'),
          }"
        />
      </div>
    </div>

    <div class="col-lg-12 col-sm-12">
      <div class="form-group">
        <textarea
          name="paragraph"
          formControlName="paragraph"
          class="form-control"
          [placeholder]="labels.videoDescription.placeholder[lang]"
          [ngClass]="{
            'inline-text-input__invalid': isFieldInvalid('paragraph'),
          }"
          style="resize: vertical; min-height: 200px; max-height: 400px"
        ></textarea>
      </div>
    </div>

    <div class="col-lg-12 col-sm-12">
      <div class="form-group">
        <textarea
          name="source"
          formControlName="source"
          class="form-control"
          [placeholder]="labels.videoSource.placeholder[lang]"
          [ngClass]="{
            'inline-text-input__invalid': isFieldInvalid('source'),
          }"
          style="resize: vertical; min-height: 50px; max-height: 100px"
        ></textarea>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-5 col-sm-12 d-flex m-auto">
      <button type="submit" class="btn default-btn success-button m-1">
        {{ labels.addResource[lang] }}
      </button>
      <button type="reset" class="btn default-btn clean-button m-1">
        {{ labels.restoreChanges[lang] }}
      </button>
    </div>
  </div>
</form>
