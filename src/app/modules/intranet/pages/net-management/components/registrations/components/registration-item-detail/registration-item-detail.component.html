<li
  class="list-group-item d-flex justify-content-between align-items-center flex-wrap pt-3 pb-3"
  >
  <h6 class="mb-0 d-flex flex-row justify-content-start align-items-center">
    <i class="bx bx-group" style="font-size: 30px"></i>
    <span style="margin-left: 10px">{{ labels.networkCommissions[lang] }}</span>
  </h6>

  @for (commission of registration.networkCommissions; track commission) {

      <p>
        {{ getCommissionName(commission, lang) }}

    </div>
  }
</li>
