<section class="pt-2">
  <div class="tab get-quote-tab">
    <ul class="tabs">
      <li class="default-btn" (click)="changeActiveTab(0)" #allEventsTab>
        {{ labels.listEvents[lang] }}
      </li>
      <li class="default-btn" (click)="changeActiveTab(1)">
        {{ eventToEdit ? labels.editEvent[lang] : labels.createEvent[lang] }}
      </li>
    </ul>

    <div class="mb-5">
      <div>
        @switch (activeTabIndex) {
          @case (0) {
            <div class="tabs_item">
              <app-list-events
                (onEditEvent)="handleEditEvent($event)"
              ></app-list-events>
            </div>
          }
          @case (1) {
            <div class="tabs_item">
              <app-create-event
                [eventUrlNameToEdit]="eventToEdit?.urlName"
                (onSubmit)="submitEvent($event)"
                (onCancelUpdate)="handleCancelUpdate()"
              ></app-create-event>
            </div>
          }
        }
      </div>
    </div>
  </div>
</section>
