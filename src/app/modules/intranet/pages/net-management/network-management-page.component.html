<section class="pt-2">
  <div class="tab get-quote-tab">
    <ul class="tabs">
      <li (click)="changeActiveTab(0)">{{ labels.registrations[lang] }}</li>
      <li (click)="changeActiveTab(1)">{{ labels.retirements[lang] }}</li>
    </ul>

    <div class="mb-5">
      <div>
        @switch (activeTabIndex) {
          @case (0) {
            <div class="tabs_item">
              <app-network-registrations></app-network-registrations>
            </div>
          }
          @case (1) {
            <div class="tabs_item">
              <app-network-retirements></app-network-retirements>
            </div>
          }
        }
      </div>
    </div>
  </div>
</section>
