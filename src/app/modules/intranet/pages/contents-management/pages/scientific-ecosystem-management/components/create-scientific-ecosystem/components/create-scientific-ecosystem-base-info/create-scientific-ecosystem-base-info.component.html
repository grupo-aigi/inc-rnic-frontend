<form [formGroup]="formGroup" (ngSubmit)="handleSubmit()">
  <div class="row pt-3">
    <div class="col-lg-12 col-sm-12">
      <div class="form-group">
        <input
          type="text"
          name="title"
          formControlName="title"
          class="form-control"
          [placeholder]="labels.title.placeholder[lang]"
          [ngClass]="{
            'inline-text-input__invalid': isFieldInvalid('title'),
          }"
        />
        @if (isFieldInvalid('title')) {
          <small class="input-label__invalid">
            {{ labels.title.error[lang] }}
          </small>
        }
      </div>
    </div>
  </div>

  <div class="row mt-5">
    <div class="col-lg-5 col-sm-12 d-flex m-auto">
      @if (!baseInfo) {
        <button type="submit" class="btn default-btn success-button m-1">
          {{ labels.buttons.continue[lang] }}
        </button>
      }
    </div>
  </div>
</form>
