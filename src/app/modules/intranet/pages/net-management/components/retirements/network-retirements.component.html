<section class="section pt-5 pb-5">
  <div class="container">
    <app-retirements-filters
      (onFiltersChange)="handleUpdateFilters($event)"
    ></app-retirements-filters>

    <app-complete-pagination
      [totalElements]="pagination.totalElements"
      [pageSize]="pagination.pageSize"
      [currentPage]="pagination.currentPage"
      [showTotalRecords]="true"
      (onPageChange)="handleGoToPage($event)"
      >
    </app-complete-pagination>

    <div class="row">
      <div class="col-lg-12">
        <div class="candidate-list">
          @for (retirement of retirements; track retirement) {
            <div>
              <app-retirement-item
                [retirement]="retirement"
                (onConfirmed)="handleRetirementConfirmed(retirement)"
                (onDenied)="handleRetirementDenied(retirement)"
              ></app-retirement-item>
            </div>
          }
        </div>
      </div>
    </div>

    @if (retirements.length > 0) {
      <div>
        <app-complete-pagination
          [totalElements]="pagination.totalElements"
          [pageSize]="pagination.pageSize"
          [currentPage]="pagination.currentPage"
          [showTotalRecords]="true"
          (onPageChange)="handleGoToPage($event)"
          >
        </app-complete-pagination>
      </div>
    }
  </div>
</section>
