<div>
  <div class="mb-3">
    @for (paragraph of section.paragraphs; track $index) {
      <p>
        {{ section.paragraphs }}
      </p>
    }
  </div>

  <div class="mb-3">
    <app-grid-images
      [images]="section.images"
      [resourceDirectory]="'events'"
    ></app-grid-images>
  </div>

  @for (archive of section.resources; track $index) {
    <div
      class="container-fluid px-3 py-2 mb-3 bg-secondary rounded-1 text-white"
    >
      <div class="d-flex align-items-center gap-3">
        <div class="flex-shrink-0">
          <img
            [src]="'/img/events/filetypes/' + archive.filetype + '.png'"
            [alt]="archive.originalFilename"
            style="width: 30px"
            class="image-list"
            [title]="archive.originalFilename"
          />
        </div>

        <div class="flex-grow-1">
          <p class="fw-bold">{{ archive.filename }}</p>
        </div>

        <div class="d-flex gap-2 flex-shrink-0">
          <a [href]="attachmentUrl" class="btn btn-primary btn-sm">
            <i class="bx bx-cloud-download"></i> Descargar
          </a>
          <button
            (click)="handleFetchPdf(archive.filename)"
            class="btn btn-info btn-sm text-white"
          >
            <i class="bx bx-show"></i> Ver
          </button>
        </div>
      </div>

      @if (errorDocument) {
        <div class="alert alert-danger mt-3" role="alert">
          <i class="bx bx-error-circle"></i> Error al cargar el documento
        </div>
      }

      @if (displayPdfDocument && !errorDocument) {
        <div class="mt-3">
          <button (click)="hideDocument()" class="btn btn-danger btn-sm mb-2">
            <i class="bx bx-hide"></i> Ocultar
          </button>
          <div style="height: 80vh">
            <iframe
              id="pdfFrame"
              [src]="pdfDocument"
              width="100%"
              height="100%"
              frameborder="0"
            ></iframe>
          </div>
        </div>
      }
    </div>
  }

          class="w-75 h-auto"

          alt="challenges"
        />
      </div>
    </div>
  </div> -->
</div>
