<div class="map-area">
  <iframe
    [src]="mapUrl"
    width="600"
    height="450"
    style="border: 0"
    allowfullscreen=""
    loading="lazy"
    referrerpolicy="no-referrer-when-downgrade"
  ></iframe>
  @if (content.detail) {
    <div class="source my-2">
      <b>
        {{ content.detail }}
      </b>
    </div>
  }
</div>
