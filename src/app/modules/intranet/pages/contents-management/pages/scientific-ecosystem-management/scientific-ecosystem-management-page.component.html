<section class="pt-2">
  <div class="tab get-quote-tab">
    <ul class="tabs">
      <li #announcementsLI (click)="changeActiveTab(0)">
        {{ labels.currentScientificEcosystem[lang] }}
      </li>
      <li (click)="changeActiveTab(1)">
        {{ labels.editScientificEcosystem[lang] }}
      </li>
    </ul>

    <div class="mb-5">
      <div>
        @switch (activeTabIndex) {
          @case (0) {
            <div class="tabs_item">
              <app-current-scientific-ecosystem></app-current-scientific-ecosystem>
            </div>
          }
          @case (1) {
            <div class="tabs_item">
              <app-scientific-ecosystem-update></app-scientific-ecosystem-update>
            </div>
          }
        }
      </div>
    </div>
  </div>
</section>
