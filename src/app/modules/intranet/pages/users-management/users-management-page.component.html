<section class="pt-2">
  <div class="tab get-quote-tab">
    <ul class="tabs">
      <li class="default-btn" (click)="changeActiveTab(0)">
        {{ labels.listUsers[lang] }}
      </li>
      <li class="default-btn" (click)="changeActiveTab(1)">
        {{ labels.addUsers[lang] }}
      </li>
    </ul>

    <div class="mb-5">
      <div>
        @switch (activeTabIndex) {
          @case (0) {
            <div class="tabs_item">
              <app-user-list></app-user-list>
            </div>
          }
          @case (1) {
            <div class="tabs_item">
              <app-add-users></app-add-users>
            </div>
          }
        }
      </div>
    </div>
  </div>
</section>
