@if (loadingSummaries) {
  <div>
    <div
      class="d-flex flex-column align-items-center justify-content-center"
      style="height: 30vh"
      >
      <div class="spinner-border" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="my-2 dynamic-font-size">
        {{ labels.loadingTags[lang] }}
      </p>
    </div>
  </div>
} @else {
  @if (errorSummaries) {
    <div>
      <button
        (click)="handleRetryFetch()"
        [disabled]="loadingSummaries"
        class="btn default-btn bg-danger p-2"
        >
        {{ labels.retryButton[lang] }}
        <i class="bx bx-refresh"></i>
      </button>
    </div>
  } @else {
    <ul>
      @for (tag of newsTagsSummaries; track tag) {
        <li>
          <a
            target="_blank"
          [href]="
            variant === 'PUBLIC'
              ? '/noticias?etiquetaId=' + tag.id
              : '/intranet/noticias?etiquetaId=' + tag.id
          "
            >#{{ tag.name }} ({{ tag.count }})</a
            >
          </li>
        }
      </ul>
      <div class="mt-3">
        <a
          href="#"
          data-bs-toggle="modal"
          data-bs-target="#allNewsTagsModal"
          class="read-more"
          >
          {{ labels.seeAll[lang] }}
        </a>
      </div>
    }
  }


  <app-news-tags-modal></app-news-tags-modal>
