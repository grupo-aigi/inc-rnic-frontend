name: Deploy RNIC Frontend to Production

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      IMAGE_NAME: cancerologiadevteam/rnic-frontend
      K8S_NAMESPACE: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Angular (production)
        run: npm run build -- --configuration production

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:${{ github.ref_name }} .

      - name: Push Docker image
        run: docker push $IMAGE_NAME:${{ github.ref_name }}

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_PROD }}" > kubeconfig

      - name: Deploy to Kubernetes
        run: |
          sed -i "s|IMAGE_TAG|${{ github.ref_name }}|g" k8s/deployment.yml
          kubectl --kubeconfig=$PWD/kubeconfig apply -f k8s/deployment.yml --validate=false
